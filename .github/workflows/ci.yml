name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx aiosqlite

      - name: Run tests with coverage
        env:
          X_API_KEY: "test_key_for_ci_checks_only_must_be_long_enough"
          AUTH_SALT: "test_auth_salt_for_ci_checks_only_123456"
        run: |
          pytest --cov=app tests/

  deploy:
    name: Deploy to Yandex Cloud VDS
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
      - x64
    timeout-minutes: 30
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: http://213.165.196.208:8000

    steps:
      - uses: actions/checkout@v4

      - name: Validate production secrets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          AUTH_SALT: ${{ secrets.AUTH_SALT }}
        run: |
          if [ -z "$X_API_KEY" ]; then
            echo "X_API_KEY secret is not set for the production environment."
            exit 1
          fi

          if [ -z "$AUTH_SALT" ]; then
            echo "AUTH_SALT secret is not set for the production environment."
            exit 1
          fi

      - name: Create production env file
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          AUTH_SALT: ${{ secrets.AUTH_SALT }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DEBUG_MODE: ${{ secrets.DEBUG_MODE }}
        run: |
          umask 077
          {
            printf 'X_API_KEY=%s\n' "$X_API_KEY"
            printf 'AUTH_SALT=%s\n' "$AUTH_SALT"
            printf 'LOG_LEVEL=%s\n' "${LOG_LEVEL:-INFO}"
            printf 'DEBUG_MODE=%s\n' "${DEBUG_MODE:-false}"
          } > .env

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and restart application
        run: |
          docker compose -p zebrastat up -d --build --remove-orphans

      - name: Wait for API health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if docker compose -p zebrastat exec -T api python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()" >/dev/null 2>&1; then
              exit 0
            fi

            echo "Waiting for API health endpoint (${attempt}/20)..."
            sleep 3
          done

          echo "API health endpoint did not become ready in time."
          docker compose -p zebrastat ps
          docker compose -p zebrastat logs --tail 200 api
          exit 1

      - name: Initialize database
        run: |
          docker compose -p zebrastat exec -T api python -m scripts.init_db

      - name: Wait for API health after database init
        run: |
          for attempt in $(seq 1 20); do
            if docker compose -p zebrastat exec -T api python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()" >/dev/null 2>&1; then
              exit 0
            fi

            echo "Waiting for API health after init (${attempt}/20)..."
            sleep 3
          done

          echo "API health endpoint did not recover after database initialization."
          docker compose -p zebrastat ps
          docker compose -p zebrastat logs --tail 200 api
          exit 1

      - name: Verify deployment health
        run: |
          curl --fail --silent --show-error --retry 20 --retry-delay 3 --retry-connrefused --retry-all-errors http://127.0.0.1:8000/health

      - name: Show compose status on failure
        if: failure()
        run: |
          docker compose -p zebrastat ps
          docker compose -p zebrastat logs --tail 200

      # - name: Remove generated env file
      #   if: always()
      #   run: |
      #     rm -f .env
