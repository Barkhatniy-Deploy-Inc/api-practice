services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zebrastat_api
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/dtp.db
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG_MODE: ${DEBUG_MODE:-false}
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  sqlite_data:
  app_logs:
